server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets — keep SSE responses out of it (already excluded by content-type).
    gzip on;
    gzip_types text/css text/plain application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ─── API proxy ───────────────────────────────────────────────
    # SSE requires buffering OFF and a long read timeout, otherwise
    # nginx will hold the response and the browser will get nothing.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE-friendly knobs.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding on;
    }

    # ─── SPA fallback ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No cache for index.html so deploys roll out cleanly.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
