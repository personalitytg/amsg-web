# AMSG Web — full stack
# Copy `.env.example` to `.env` and adjust before running:
#
#     docker compose up --build
#
# Then visit http://localhost:5173

services:
  backend:
    build:
      context: ./backend
    image: amsg-web-backend:latest
    container_name: amsg-backend
    restart: unless-stopped
    environment:
      AMSG_DEBUG: "${AMSG_DEBUG:-false}"
      AMSG_CORS_ORIGINS: '${AMSG_CORS_ORIGINS:-["http://localhost:5173"]}'
      AMSG_MAX_CONCURRENT_JOBS: "${AMSG_MAX_CONCURRENT_JOBS:-2}"
      AMSG_JOB_TTL_SECONDS: "${AMSG_JOB_TTL_SECONDS:-3600}"
      AMSG_RUNS_DIR: "/data/runs"
      AMSG_CACHE_DIR: "/data/cache"
    volumes:
      - amsg-runs:/data/runs
      - amsg-cache:/data/cache
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - amsg

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin: nginx proxies /api → backend:8000 inside the network.
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    image: amsg-web-frontend:latest
    container_name: amsg-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - amsg

volumes:
  amsg-runs:
  amsg-cache:

networks:
  amsg:
    driver: bridge
